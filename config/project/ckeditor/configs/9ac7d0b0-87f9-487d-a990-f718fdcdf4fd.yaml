headingLevels:
  - 2
  - 3
  - 4
name: Basic
options:
  alignment:
    options:
      - left
      - right
      - center
  htmlSupport:
    allow:
      -
        attributes: true
        classes: true
        styles: true
  link:
    addTargetToExternalLinks: false
    decorators:
      openInNewTab:
        attributes:
          rel: 'noopener noreferrer'
          target: _blank
        label: 'Open in a new tab'
        mode: manual
  list:
    properties:
      reversed: false
      startIndex: false
      styles: false
toolbar:
  - heading
  - underline
  - bold
  - italic
  - bulletedList
  - numberedList
  - link
  - removeFormat
